name: Deploy kipo-landing → Vercel

on:
  push:
    branches: [main]
    paths:
      - 'src/apps/kipo-landing/**'
      - '.github/workflows/deploy-landing.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/apps/kipo-landing/**'

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install -g vercel@latest
          pnpm install --frozen-lockfile

      - name: Build with Vercel CLI
        run: vercel build --token=${{ secrets.VERCEL_TOKEN}}--cwd=src/apps/kipo-landing

      - name: Deploy (preview)
        if: github.event_name == 'pull_request'
        run: vercel deploy --preview --yes --token=${{ secrets.VERCEL_TOKEN}} --cwd=src/apps/kipo-landing
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --preview --yes --token=${{ secrets.VERCEL_TOKEN}} --cwd=src/apps/kipo-landing
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
