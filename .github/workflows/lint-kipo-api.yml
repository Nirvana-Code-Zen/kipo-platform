name: Lint kipo-api

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'src/apps/kipo-platform/**'
              - '.github/workflows/lint-kipo-api.yml'

      - uses: astral-sh/setup-uv@v8.3.2
        if: steps.filter.outputs.api == 'true'
        with:
          python-version: "3.14"

      - name: Install dependencies
        if: steps.filter.outputs.api == 'true'
        working-directory: src/apps/kipo-platform
        run: uv sync

      - name: Lint
        if: steps.filter.outputs.api == 'true'
        working-directory: src/apps/kipo-platform
        run: uv run ruff check .
