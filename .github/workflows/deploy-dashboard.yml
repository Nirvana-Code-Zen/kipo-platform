name: Deploy kipo-dashboard → Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # All env vars come from GitHub (Secrets/Variables), not from Vercel
      # project settings — this is a remote build, so both --build-env
      # (baked into the client bundle at build time) and --env (available
      # to the deployed Server Components/route handlers at runtime) are
      # needed for the NEXT_PUBLIC_* vars.
      - name: Deploy to production
        shell: bash
        run: |
          ARGS=(deploy --prod --yes --token "$VERCEL_TOKEN")
          ARGS+=(--build-env "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL")
          ARGS+=(--build-env "NEXT_PUBLIC_APP_DOMAIN=$NEXT_PUBLIC_APP_DOMAIN")
          ARGS+=(--env "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL")
          ARGS+=(--env "NEXT_PUBLIC_APP_DOMAIN=$NEXT_PUBLIC_APP_DOMAIN")
          vercel "${ARGS[@]}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_DOMAIN: ${{ vars.NEXT_PUBLIC_APP_DOMAIN }}
