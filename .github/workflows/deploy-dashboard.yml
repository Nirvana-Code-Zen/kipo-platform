name: Deploy kipo-dashboard → Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno destino"
        type: choice
        options:
          - Production
          - Staging
        default: Production

jobs:
  deploy:
    name: Deploy to Vercel (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: inputs.environment == 'Staging' || github.ref == 'refs/heads/main'
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: ./.github/actions/deploy-vercel
        with:
          production: ${{ inputs.environment == 'Production' }}
          env-keys: NEXT_PUBLIC_API_URL NEXT_PUBLIC_APP_DOMAIN
          alias-domains: staging.kipo.com.mx *.staging.kipo.com.mx
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_DOMAIN: ${{ vars.NEXT_PUBLIC_APP_DOMAIN }}
