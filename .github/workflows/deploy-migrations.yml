name: Deploy Supabase migrations

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno destino"
        type: choice
        options:
          - Production
          - Staging
        default: Production

jobs:
  push:
    name: supabase db push (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: inputs.environment == 'Staging' || github.ref == 'refs/heads/main'
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push -p "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
