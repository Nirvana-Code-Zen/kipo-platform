name: Deploy kipo-platform → Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno destino"
        type: choice
        options:
          - Production
          - Staging
        default: Production

jobs:
  deploy:
    name: Deploy to Vercel (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: inputs.environment == 'Staging' || github.ref == 'refs/heads/main'
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      # FLASK_ENV se manda como "production" en ambos entornos a propósito:
      # shared/config.py todavía no tiene una entrada "staging" en
      # config_mapping y el import fallaría con KeyError.
      - name: Deploy
        uses: ./.github/actions/deploy-vercel
        with:
          production: ${{ inputs.environment == 'Production' }}
          env-keys: >-
            DATABASE_URL PROJECT_URL AUTH_KEY_PUBLISHABLE AUTH_KEY_SECRET
            STORAGE_URL STORAGE_ACCESS_KEY STORAGE_SECRET_KEY STORAGE_REGION
            CORS_EXTRA_ORIGINS CORS_WILDCARD_DOMAIN FLASK_ENV
          alias-domains: staging-api.kipo.com.mx
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROJECT_URL: ${{ vars.PROJECT_URL }}
          AUTH_KEY_PUBLISHABLE: ${{ secrets.AUTH_KEY_PUBLISHABLE }}
          AUTH_KEY_SECRET: ${{ secrets.AUTH_KEY_SECRET }}
          STORAGE_URL: ${{ vars.STORAGE_URL }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          STORAGE_REGION: ${{ vars.STORAGE_REGION }}
          CORS_EXTRA_ORIGINS: ${{ vars.CORS_EXTRA_ORIGINS }}
          CORS_WILDCARD_DOMAIN: ${{ vars.CORS_WILDCARD_DOMAIN }}
          FLASK_ENV: production
