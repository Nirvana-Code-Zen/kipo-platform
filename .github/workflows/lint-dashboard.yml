name: Lint kipo-dashboard

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/apps/kipo-dashboard/**'
      - '.github/workflows/lint-dashboard.yml'

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter kipo-dashboard-ui lint
