name: Lint kipo-dashboard

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'src/apps/kipo-dashboard/**'
              - '.github/workflows/lint-dashboard.yml'

      - uses: pnpm/action-setup@v4
        if: steps.filter.outputs.dashboard == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.dashboard == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.dashboard == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.filter.outputs.dashboard == 'true'
        run: pnpm --filter kipo-dashboard-ui lint
