# Isolated Supabase stack used only by Playwright e2e tests (e2e/).
# Distinct project_id + port offset (+1000) so it can run alongside the
# developer's normal `supabase start` without colliding. Never used for
# anything but ephemeral test runs — always started and stopped with
# `--no-backup`, so nothing here persists between runs.
project_id = "kipo-platform-e2e"

[api]
enabled = true
port = 55321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 55322
shadow_port = 55320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 55329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false

[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

[realtime]
enabled = false

[studio]
enabled = false
port = 55323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = false
port = 55324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = true

[storage.analytics]
enabled = false

[storage.vector]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3100"
additional_redirect_urls = [
  "http://localhost:3100/callback",
  "http://localhost:3100/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.rate_limit]
email_sent = 100
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 100
token_verifications = 30
web3 = 30

[auth.email]
enable_signup = true
double_confirm_changes = false
# Disabled only in this throwaway test stack — no real inbox to read a
# confirmation link from. Accounts are usable immediately after sign-up.
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.external.google]
enabled = false

[auth.external.facebook]
enabled = false

[auth.external.apple]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
port = 55327

[experimental]
[experimental.pgdelta]
enabled = true
